<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Fluxer Auditoria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <noscript>
    <div style="font-family:sans-serif;padding:2rem;text-align:center;">
      <p>JavaScript está desativado. Ative para usar a aplicação.</p>
      <p><a href="/login">Ir para o login</a></p>
    </div>
  </noscript>
  <div id="load-fallback" style="display:none;font-family:sans-serif;padding:2rem;text-align:center;max-width:420px;margin:2rem auto;">
    <p style="font-weight:600;">A página não carregou.</p>
    <p style="margin-top:8px;color:#666;">Tente: atualizar com Ctrl+Shift+R (ou Cmd+Shift+R no Mac), limpar cache do navegador ou abrir em outra aba anônima.</p>
    <p style="margin-top:12px;"><a href="/" style="color:#0d1526;">Recarregar a página</a></p>
  </div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    (function() {
      var fallback = document.getElementById('load-fallback');
      var root = document.getElementById('root');
      window.addEventListener('error', function(e) {
        if (e.filename && (e.filename.indexOf('/assets/') !== -1 || e.filename.indexOf('main') !== -1)) {
          if (fallback) fallback.style.display = 'block';
        }
      }, true);
      setTimeout(function() {
        if (root && root.children.length === 0 && fallback) {
          fallback.style.display = 'block';
        }
      }, 6000);
    })();
  </script>
</body>
</html>
