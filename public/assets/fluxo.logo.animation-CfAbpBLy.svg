<svg id="FLUXER" xmlns="http://www.w3.org/2000/svg" viewBox="-50 0 600 200">
  <defs>
    <style>
      .cls-1 {
        stroke-width: 0px;
      }

      #F {
        filter: opacity(0);
        transform: translate(-40px);
        animation: efe 2s 0.5s;
        animation-iteration-count: 1;
        animation-direction: normal;
        animation-fill-mode: both;
      }

      @keyframes efe {
        to {
          transform: translate(0px);
          filter: opacity(100);
        }
      }

      #L {
        filter: opacity(0);
        transform: translate(-80px);
        animation: ele 1.5s 0.4s;
        animation-iteration-count: 1;
        animation-direction: normal;
        animation-fill-mode: both;
      }

      @keyframes ele {
        to {
          transform: translate(0px);
          filter: opacity(100);
        }
      }

      #X1 {
        visibility: hidden;
        transform: translate(-200px);
        animation: xisum 1s;
        animation-iteration-count: 1;
        animation-direction: normal;
        animation-fill-mode: both;
      }

      @keyframes xisum {
        to {
          transform: translate(0px);
          visibility: visible;
        }
      }

      #U {
        filter: opacity(0);
        transform: translate(-150px);
        animation: uu 1s 0.3s;
        animation-iteration-count: 1;
        animation-direction: normal;
        animation-fill-mode: both;
      }

      @keyframes uu {
        to {
          transform: translate(0px);
          filter: opacity(100);
        }
      }

      #R {
        stroke-width: 2px;
        stroke: #000;
        stroke-dasharray: 3000;
        stroke-dashoffset: 3000;
        fill: #00000000;
        transform: translate(40px);
        animation: tracado 5s running, erre 1s 1s;
        animation-iteration-count: 1;
        animation-direction: alternate;
        animation-fill-mode: both;
        animation-timing-function: easy-in-out;
      }

      #E {
        stroke-width: 2px;
        stroke: #000;
        stroke-dasharray: 3000;
        stroke-dashoffset: 3000;
        fill: #00000000;
        transform: translate(40px);
        animation: tracado 5s running, erre 1s 1s;
        animation-iteration-count: 1;
        animation-direction: alternate;
        animation-fill-mode: both;
        animation-timing-function: easy-in-out;
      }

      @keyframes tracado {
        to {
          stroke-dashoffset: 0;
          transform: translate(0px);
        }
      }

      @keyframes erre {
        to {
          transform: translate(0px);
          visibility: visible;
          transform: translate(0px);
          fill: #000000;
          stroke-width: 0px;
        }
      }

      #Ponto {
        stroke-width: 2px;
        stroke: #000;
        stroke-dasharray: 3000;
        stroke-dashoffset: 3000;
        animation: tracado 5s 1.5s running, loopBolinha 1s 1.5s;
        animation-iteration-count: 1;
        animation-direction: alternate;
        animation-fill-mode: both;
        animation-timing-function: easy-in-out;
        fill: #00000000;
      }

      @keyframes loopBolinha {
        to {
          fill: #000000;
        }
      }

      #X2 {
        stroke-width: 2px;
        stroke: #000;
        stroke-dasharray: 3000;
        stroke-dashoffset: 3000;
        fill: #00000000;
        transform: translate(40px, -20px);
        animation: tracado 5s running, xisdois 0.5s 1s;
        animation-iteration-count: 1;
        animation-direction: alternate;
        animation-fill-mode: both;
        animation-timing-function: easy-in-out;
      }

      @keyframes xisdois {
        to {
          transform: translate(0px 0px);
          visibility: visible;
          transform: translate(0px);
          fill: #000000;
          stroke-width: 0px;
        }
      }

      #X3 {
        stroke-width: 2px;
        stroke: #000;
        stroke-dasharray: 3000;
        stroke-dashoffset: 3000;
        fill: #00000000;
        transform: translate(40px, 20px);
        animation: tracado 5s running, xisdois 0.5s 1s;
        animation-iteration-count: 1;
        animation-direction: alternate;
        animation-fill-mode: both;
        animation-timing-function: easy-in-out;
      }
    </style>
  </defs>
