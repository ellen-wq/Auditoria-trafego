<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Fluxer Auditoria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-x"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></div>
        fluxer<span>.</span>
      </div>
      <p class="auth-subtitle">Faça login para acessar a auditoria de tráfego</p>

      <div id="alert" class="alert alert-error"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="Sua senha" required>
        </div>
        <button type="submit" class="btn btn-primary">Entrar</button>
      </form>

      <p class="auth-footer">
        Não tem conta? <a href="/register.html">Cadastre-se</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    (function () {
      var user = API.getUser();
      if (user && API.token) {
        window.location.href = user.role === 'LIDERANCA' ? '/admin/dashboard.html' : '/app/auditoria-upload.html';
        return;
      }

      document.getElementById('login-form').addEventListener('submit', function (e) {
        e.preventDefault();
        hideAlert('alert');
        var email = document.getElementById('email').value;
        var password = document.getElementById('password').value;

        API.post('/api/auth/login', { email: email, password: password })
          .then(function (data) {
            API.setAuth(data.token, data.user);
            window.location.href = data.user.role === 'LIDERANCA' ? '/admin/dashboard.html' : '/app/auditoria-upload.html';
          })
          .catch(function (err) {
            showAlert('alert', err.message || 'Erro ao entrar.');
          });
      });
    })();
  </script>
</body>
</html>
